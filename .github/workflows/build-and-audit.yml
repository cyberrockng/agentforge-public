name: Build and Audit

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-audit:
    name: build-and-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - name: Install
        run: npm ci
      - name: Audit high and critical vulnerabilities
        run: npm audit --audit-level=high
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
